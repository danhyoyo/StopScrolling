<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stop Scrolling</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="control-board">
        <aside class="platform-rail">
          <div class="brand-block">
            <p class="brand-mini">Stop Scrolling</p>
            <p class="brand-copy">Set a scroll limit for each platform you want to slow down.</p>
          </div>

          <nav class="platform-list" id="siteList" aria-label="Platforms"></nav>

          <div class="support-pill" aria-hidden="true">
            <span class="support-icon">cup</span>
            <span>if you'd like to support</span>
          </div>
        </aside>

        <section class="detail-panel" id="detailPanel">
          <header class="detail-top">
            <h1 class="detail-title" id="panelTitle">Facebook</h1>
            <div class="remaining-card">
              <span class="remaining-value" id="remainingCount">0</span>
              <span class="remaining-label" id="remainingLabel">scrolls left today</span>
            </div>
            <p class="detail-copy" id="activeSummary">Loading...</p>
          </header>

          <section class="setting-block">
            <div class="setting-head">
              <label class="setting-label" for="limitRange">Number of Scrolls</label>
              <input
                class="limit-pill-input"
                id="limitNumber"
                min="1"
                max="500"
                step="1"
                type="number"
              >
            </div>

            <input
              class="limit-range"
              id="limitRange"
              min="1"
              max="500"
              step="1"
              type="range"
            >

            <div class="usage-row">
              <span class="usage-copy" id="usageCount">0 / 0 scrolls used today</span>
            </div>

            <div class="progress-track">
              <div class="progress-fill" id="progressFill"></div>
            </div>
          </section>
        </section>
      </section>
    </main>

    <script src="shared.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
